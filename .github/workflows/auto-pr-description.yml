name: Auto PR Description

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main

permissions:
  pull-requests: write

jobs:
  fill-description:
    name: Fill PR description from commits
    runs-on: ubuntu-latest
    # 只在 description 为空时填写，避免覆盖手动编辑的内容
    if: "!github.event.pull_request.body"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Generate and update PR description
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
          BRANCH: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # 获取本 PR 的所有 commit
          commits=$(git log --pretty=format:"- \`%h\` %s" "$BASE".."$HEAD")
          commit_count=$(git rev-list --count "$BASE".."$HEAD")

          # 取最新 commit 的完整 body 作为补充说明
          first_body=$(git log -1 --pretty=format:"%b" "$HEAD")

          # 拼接 description，写入临时文件避免特殊字符转义问题
          {
            echo "## Changes"
            echo ""
            echo "$commits"

            if [[ -n "$first_body" ]]; then
              echo ""
              echo "## Details"
              echo ""
              echo "$first_body"
            fi

            echo ""
            echo "---"
            echo "*🤖 Description auto-generated from $commit_count commit(s) on \`$BRANCH\`*"
          } > /tmp/pr_body.md

          gh pr edit "$PR_NUMBER" --repo "$REPO" --body-file /tmp/pr_body.md
          echo "✅ PR #$PR_NUMBER description updated"
