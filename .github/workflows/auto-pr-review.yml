name: Auto PR Review & Merge

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
      - 'bugfix/**'
      - 'hotfix/**'
      - 'refactor/**'
      - 'chore/**'
      - 'docs/**'
      - 'test/**'
      - 'perf/**'
      - 'ci/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────
  # 1. 创建 PR（如果还没有）
  # ──────────────────────────────────────────────
  create-pr:
    name: Create PR
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.create.outputs.pr_number }}
    steps:
      - name: Create or find PR
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          existing=$(gh pr list --repo "$REPO" --head "$BRANCH" --state open | awk '{print $1}' | head -1)

          if [[ -n "$existing" ]]; then
            echo "PR already exists: #$existing"
            echo "pr_number=$existing" >> $GITHUB_OUTPUT
          else
            title=$(echo "$BRANCH" | sed 's|feature/||;s|fix/||;s|-| |g')
            pr_url=$(gh pr create \
              --repo "$REPO" \
              --base main \
              --head "$BRANCH" \
              --title "$title" \
              --body "🤖 Auto-created by GitHub Actions. Pending DeepSeek review.")
            pr_number=$(echo "$pr_url" | grep -oE '[0-9]+$')
            echo "Created PR #$pr_number"
            echo "pr_number=$pr_number" >> $GITHUB_OUTPUT
          fi

  # ──────────────────────────────────────────────
  # 2. DeepSeek 代码审查
  # ──────────────────────────────────────────────
  deepseek-review:
    name: DeepSeek Code Review
    runs-on: ubuntu-latest
    needs: create-pr
    outputs:
      approved: ${{ steps.review.outputs.approved }}
      summary: ${{ steps.review.outputs.summary }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get diff
        id: diff
        run: |
          git fetch origin main
          diff=$(git diff origin/main...HEAD -- \
            '*.ts' '*.tsx' '*.js' '*.json' '*.sh' '*.md' \
            | head -c 30000)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$diff" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: DeepSeek review
        id: review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          DIFF: ${{ steps.diff.outputs.diff }}
        run: |
          response=$(curl -s https://api.deepseek.com/chat/completions \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "model": "deepseek-v4-pro",
            "max_tokens": 4096,
            "messages": [
              {
                "role": "system",
                "content": "你是一位资深全栈工程师，专注于 TypeScript、Node.js、Bun、LangGraph、LangChain 技术栈，熟悉多 Agent 系统架构设计。你的代码审查风格严谨、直接，能精准识别潜在问题并给出可落地的改进建议。"
              },
              {
                "role": "user",
                "content": "请对以下 PR 进行专业代码审查。\n\n仓库：$REPO\n分支：$BRANCH\n\n## 变更内容\n\`\`\`diff\n$DIFF\n\`\`\`\n\n## 审查维度\n\n请按以下维度逐一评估，每个维度给出 **评级**（✅ 良好 / ⚠️ 需关注 / ❌ 必须修复）和具体说明：\n\n1. **正确性** — 逻辑是否正确，是否有明显 bug，边界情况是否处理\n2. **安全性** — 是否有密钥/token 硬编码，输入是否做了校验，是否有注入风险\n3. **架构合理性** — 是否符合项目现有架构（LangGraph 多 Agent 模式），模块职责是否清晰\n4. **类型安全** — TypeScript 类型是否严谨，是否有滥用 any 或不必要的类型断言\n5. **错误处理** — 异常是否被正确捕获和处理，是否有合理的 fallback\n6. **性能** — 是否有明显的性能问题，如不必要的重复调用、阻塞操作\n\n## 输出格式\n\n用 Markdown 格式输出审查报告，包含：\n- 各维度评级和说明\n- 如有问题，给出具体的代码位置和修改建议\n- 整体总结（1-2句话）\n\n最后一行必须是以下之一（不含其他文字）：\nVERDICT: APPROVE\nVERDICT: REQUEST_CHANGES\n\n判断标准：存在 ❌ 必须修复的问题时输出 REQUEST_CHANGES，否则输出 APPROVE。"
              }
            ]
          }
          EOF
          )

          echo "DeepSeek response: $response"

          # OpenAI-compatible 格式：choices[0].message.content
          summary=$(echo "$response" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          choices = data.get('choices', [])
          if choices:
              print(choices[0].get('message', {}).get('content', 'No content'))
          else:
              print('No choices in response. Raw: ' + str(data))
          " 2>/dev/null || echo "Failed to parse response")

          if echo "$summary" | grep -q "VERDICT: APPROVE"; then
            echo "approved=true" >> $GITHUB_OUTPUT
          else
            echo "approved=false" >> $GITHUB_OUTPUT
          fi

          short_summary=$(echo "$summary" | head -c 3000)
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$short_summary" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ needs.create-pr.outputs.pr_number }}
          SUMMARY: ${{ steps.review.outputs.summary }}
          APPROVED: ${{ steps.review.outputs.approved }}
        run: |
          if [[ "$APPROVED" == "true" ]]; then
            icon="✅"
            status="**APPROVED** — 代码通过审查，准备合并"
            event="APPROVE"
          else
            icon="❌"
            status="**REQUEST CHANGES** — 发现问题，请修复后重新推送"
            event="REQUEST_CHANGES"
          fi

          body="## $icon DeepSeek 代码审查

          $status

          ---

          $SUMMARY

          ---
          *🤖 由 deepseek-v4-pro 自动审查*"

          # 提交正式 GitHub Review（满足 branch protection 的 require approvals）
          # 如果是 PR 作者自己触发，GitHub 不允许自我审批，会自动降级为评论
          if [[ "$APPROVED" == "true" ]]; then
            gh pr review "$PR_NUMBER" --repo "$REPO" --approve --body "$body" 2>/dev/null || \
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$body"
          else
            gh pr review "$PR_NUMBER" --repo "$REPO" --request-changes --body "$body" 2>/dev/null || \
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$body"
          fi

  # ──────────────────────────────────────────────
  # 3. 自动 Merge（仅审查通过时）
  # ──────────────────────────────────────────────
  auto-merge:
    name: Auto Merge
    runs-on: ubuntu-latest
    needs: [create-pr, deepseek-review]
    if: needs.deepseek-review.outputs.approved == 'true'
    steps:
      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ needs.create-pr.outputs.pr_number }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --repo "$REPO" \
            --squash \
            --admin \
            --body "Auto-merged after DeepSeek review ✅"

          echo "✅ PR #$PR_NUMBER merged"
