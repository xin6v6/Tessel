name: Auto PR Review & Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────
  # 1. DeepSeek 代码审查
  # ──────────────────────────────────────────────
  deepseek-review:
    name: DeepSeek Code Review
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.review.outputs.approved }}
      too_large: ${{ steps.diff.outputs.too_large }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Get diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          # diff 上限：deepseek-v4-pro 上下文够大，给到 120KB。
          # 关键：超限【不静默截断后照常审】—— 那会让大 PR 只被审了一部分却
          # 显示 SUCCESS、还自动合并。改为标记 too_large，跳过审查、拒绝自动合并，
          # 逼大改动拆成小 PR 或走人工审。
          MAX_DIFF_BYTES=120000

          # 不在管道中直接 head，避免 SIGPIPE 使 gh api 以非 0 退出
          # 在 pipefail 模式下这会被误判为 API 调用失败
          if ! raw=$(gh api \
            -H "Accept: application/vnd.github.v3.diff" \
            "/repos/$REPO/pulls/$PR_NUMBER"); then
            echo "❌ gh api 调用失败（网络、权限或速率限制）"
            exit 1
          fi

          echo "too_large=false" >> $GITHUB_OUTPUT

          if [[ -z "$raw" ]]; then
            echo "⚠️  diff 为空，PR 不包含受审查的文件类型（*.ts/tsx/js/json/sh/md）"
            echo "diff=" >> $GITHUB_OUTPUT
            exit 0
          fi

          if (( ${#raw} > MAX_DIFF_BYTES )); then
            echo "⚠️  diff 过大（${#raw} 字节 > ${MAX_DIFF_BYTES}）—— 跳过自动审查，需拆分或人工审。"
            echo "too_large=true" >> $GITHUB_OUTPUT
            echo "diff_size=${#raw}" >> $GITHUB_OUTPUT
            echo "diff=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "diff 大小: ${#raw} 字节"
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$raw" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: DeepSeek review
        id: review
        if: steps.diff.outputs.too_large != 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BRANCH: ${{ github.head_ref }}
          REPO: ${{ github.repository }}
          DIFF: ${{ steps.diff.outputs.diff }}
        run: |
          # 用 jq 构造 JSON，$DIFF 等变量通过 --arg 传入，自动处理所有特殊字符转义
          payload=$(jq -n \
            --arg branch "$BRANCH" \
            --arg repo "$REPO" \
            --arg diff "$DIFF" \
            '{
              model: "deepseek-v4-pro",
              max_tokens: 8192,
              messages: [
                {
                  role: "system",
                  content: "你是一位资深全栈工程师，担任 PR 审查者。技术栈：TypeScript / Bun / LangGraph / LangChain / GitHub Actions。\n\n# 你的输入只有 diff\n\n你看到的**只是 diff**：被改动的行 + 少量上下文行。你看不到：\n- 完整的源文件\n- 被调用函数的实现（即使它定义在同一个文件里）\n- 类型定义、接口、import 来源\n- 调用方、测试、文档\n\n# 硬性约束\n\n1. **只评论 diff 里实际可见的代码。**如果一个判断需要读 diff 之外的内容才能成立，**不要给出该判断**。\n2. **禁止猜测式评论。**禁用句式包括：\"需确认 X 是否实现了 Y\"、\"X 可能没有处理 Y\"、\"若 X 不支持 Y 则 …\"。这类表达暴露的是你信息不足，不是代码缺陷。\n3. **断言要有 diff 内证据。**说\"这里会抛异常\"必须能指向 diff 中可见的、确实没被 try/catch 包住的具体行。说\"类型不安全\"必须能指向 diff 中可见的 `as any` / `as Unknown` / 隐式 any 等具体证据。\n4. **不重复 diff 已说明的事实。**如果作者在 commit message、新增注释或函数名里已经解释了某个设计决策（如\"全量读取小日志文件可接受\"、\"这是有意的行为变化\"），不要再以\"建议优化\"提出来。\n5. **区分 bug 和偏好。**只有 diff 内可证的正确性/安全性/数据丢失/崩溃问题才算 ❌ **必须修复**。性能猜测、风格建议、未来可扩展性属于 ⚠️ **需关注** 或更低，**绝不**因这些拒绝 PR。\n6. **不知道就不说。**与其堆叠看似严谨的 ⚠️，不如保持空白。审查质量靠**信号密度**，不靠维度填满。\n\n# 项目背景\n\n- Bun 项目，所有 import 用 `.ts` 后缀\n- 架构：Orchestrator + Supervisor + 子 Agent（slack / web / mcp / capabilities），全部跑在 LangGraph 上\n- 日志系统：`src/observability/logger.ts` 写 `data/logs/<date>.log` 和 `<date>.error.log`，UI 服务（`src/ui/server.ts`）读取这些文件并通过 HTTP/SSE 提供\n- 已有 supervisor 护栏要求模型只基于证据回答；代码审查应保持同样的态度\n\n# 版本基线（不要依据训练数据里的过时版本提建议）\n\n- actions/checkout @ v5（基于 Node 24）\n- actions/setup-node @ v4\n- Bun 1.x\n- GitHub Actions runner 推荐 Node 24"
                },
                {
                  role: "user",
                  content: ("# 待审查 PR\n\n仓库：" + $repo + "\n分支：" + $branch + "\n\n## diff\n```diff\n" + $diff + "\n```\n\n# 审查任务\n\n按以下六维评估。每一维必须给出：\n\n- 评级：✅ 良好 / ⚠️ 需关注 / ❌ 必须修复 / ⚪ 不涉及（diff 未触及该维度）\n- 一句话说明，引用 diff 内可见的具体行/标识符作为证据。无证据则给 ⚪ 或 ✅，**不要**用 ⚠️ 凑数。\n\n1. **正确性** — 逻辑/边界/并发是否有 diff 内可见的 bug\n2. **安全性** — diff 中是否引入硬编码密钥、未经校验的外部输入、可注入路径（命令、SQL、shell、模板）\n3. **架构合理性** — diff 引入的模块边界、依赖方向、抽象是否与项目其余部分一致（仅限 diff 可证）\n4. **类型安全** — diff 内可见的 `any` / 类型断言 / 不安全转换 / 隐式 widening\n5. **错误处理** — diff 引入的 I/O / 网络 / 解析操作是否有就近的错误处理；现有 try/catch 在 diff 中**可见时**才算\n6. **性能** — diff 引入的明显热路径阻塞、N+1、O(n²) 这类**可见**问题；不要对未来增长做猜测\n\n# 自我核查\n\n在输出 VERDICT 前，对每一条 ❌ 和 ⚠️ 逐项问自己：\n\n- 我引用的证据在 diff 里**确实**可见吗？还是我在脑补 diff 之外的代码？\n- 作者是否已在 commit message、注释、函数名里说明这是有意的？\n- 这是真 bug，还是\"如果将来 X 变了就可能 Y\"？\n\n任何一项答\"是\"，删掉该条。\n\n# 输出格式\n\n报告最后一行**必须**是以下之一，且不含其他文字：\n\nVERDICT: APPROVE\nVERDICT: REQUEST_CHANGES\n\n判定规则：只有存在 ≥1 条 ❌ **必须修复** 时才输出 REQUEST_CHANGES。⚠️ 和风格建议**不应**触发 REQUEST_CHANGES。")
                }
              ]
            }')

          response=$(curl -s https://api.deepseek.com/chat/completions \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$payload")

          echo "DeepSeek response: $response"

          summary=$(echo "$response" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          choices = data.get('choices', [])
          if choices:
              print(choices[0].get('message', {}).get('content', 'No content'))
          else:
              print('No choices in response. Raw: ' + str(data))
          " 2>/dev/null || echo "Failed to parse response")

          # 取最后一行 VERDICT 做判定（prompt 要求报告末行是 VERDICT）。
          # 注意：模型常给 VERDICT 行套 Markdown 粗体（**VERDICT: APPROVE**）或
          # 前导空白，所以【不能】锚定行首为 VERDICT/空白——那会漏掉 ** 包裹的行
          # （历史 bug：APPROVE 被误判成 REQUEST_CHANGES，PR 卡 BLOCKED）。
          # 这里匹配含 VERDICT: 的行，剥掉所有非字母字符再判，对 **、空格、
          # 大小写都鲁棒。grep -i + 不锚行首；用 VERDICT 关键词避免误命中正文。
          verdict_line=$(echo "$summary" | grep -iE 'VERDICT:[[:space:]*]*APPROVE|VERDICT:[[:space:]*]*REQUEST_CHANGES' | tail -n1)
          verdict_norm=$(echo "$verdict_line" | tr '[:lower:]' '[:upper:]' | tr -cd 'A-Z_')
          # verdict_norm 形如 VERDICTAPPROVE / VERDICTREQUESTCHANGES（已去掉 **、空格、冒号）
          if [[ "$verdict_norm" == *"APPROVE"* && "$verdict_norm" != *"REQUESTCHANGES"* ]]; then
            echo "approved=true" >> $GITHUB_OUTPUT
          else
            echo "approved=false" >> $GITHUB_OUTPUT
          fi

          short_summary=$(echo "$summary" | head -c 3000)
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$short_summary" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SUMMARY: ${{ steps.review.outputs.summary }}
          APPROVED: ${{ steps.review.outputs.approved }}
          TOO_LARGE: ${{ steps.diff.outputs.too_large }}
          DIFF_SIZE: ${{ steps.diff.outputs.diff_size }}
        run: |
          if [[ "$TOO_LARGE" == "true" ]]; then
            # diff 过大：跳过了审查，明确不自动合并，提示拆分 / 人工审。
            body="## ⚠️ DeepSeek 代码审查 — 已跳过

          本 PR diff 过大（${DIFF_SIZE} 字节），超出自动审查上限，**未做自动审查、不会自动合并**。

          请拆成更小的 PR，或请人工审核后手动合并。

          ---
          *🤖 自动审查保护：大 PR 不静默放行*"
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$body"
            exit 0
          fi

          if [[ "$APPROVED" == "true" ]]; then
            icon="✅"
            status="**APPROVED** — 代码通过审查，准备合并"
          else
            icon="❌"
            status="**REQUEST CHANGES** — 发现问题，请修复后重新推送"
          fi

          body="## $icon DeepSeek 代码审查

          $status

          ---

          $SUMMARY

          ---
          *🤖 由 deepseek-v4-pro 自动审查*"

          if [[ "$APPROVED" == "true" ]]; then
            gh pr review "$PR_NUMBER" --repo "$REPO" --approve --body "$body" 2>/dev/null || \
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$body"
          else
            gh pr review "$PR_NUMBER" --repo "$REPO" --request-changes --body "$body" 2>/dev/null || \
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$body"
          fi

  # ──────────────────────────────────────────────
  # 2. 自动 Merge（仅审查通过时）
  # ──────────────────────────────────────────────
  auto-merge:
    name: Auto Merge
    runs-on: ubuntu-latest
    needs: deepseek-review
    if: needs.deepseek-review.outputs.approved == 'true'
    steps:
      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --repo "$REPO" \
            --merge \
            --admin

          echo "✅ PR #$PR_NUMBER merged"
