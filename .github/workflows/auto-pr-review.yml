name: Auto PR Review & Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────
  # 1. DeepSeek 代码审查
  # ──────────────────────────────────────────────
  deepseek-review:
    name: DeepSeek Code Review
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.review.outputs.approved }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Get diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # 用 GitHub API 拉 diff，完全绕开本地 git 对象
          # Accept: application/vnd.github.v3.diff 直接返回 patch 格式
          diff=$(gh api \
            -H "Accept: application/vnd.github.v3.diff" \
            "/repos/$REPO/pulls/$PR_NUMBER" \
            | head -c 30000)
          echo "diff 大小: ${#diff} 字节"
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$diff" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: DeepSeek review
        id: review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BRANCH: ${{ github.head_ref }}
          REPO: ${{ github.repository }}
          DIFF: ${{ steps.diff.outputs.diff }}
        run: |
          # 用 jq 构造 JSON，$DIFF 等变量通过 --arg 传入，自动处理所有特殊字符转义
          payload=$(jq -n \
            --arg branch "$BRANCH" \
            --arg repo "$REPO" \
            --arg diff "$DIFF" \
            '{
              model: "deepseek-v4-pro",
              max_tokens: 4096,
              messages: [
                {
                  role: "system",
                  content: "你是一位资深全栈工程师，专注于 TypeScript、Node.js、Bun、LangGraph、LangChain 技术栈，熟悉多 Agent 系统架构设计。你的代码审查风格严谨、直接，能精准识别潜在问题并给出可落地的改进建议。"
                },
                {
                  role: "user",
                  content: ("请对以下 PR 进行专业代码审查。\n\n仓库：" + $repo + "\n分支：" + $branch + "\n\n## 变更内容\n```diff\n" + $diff + "\n```\n\n## 审查维度\n\n请按以下维度逐一评估，每个维度给出评级（✅ 良好 / ⚠️ 需关注 / ❌ 必须修复）和具体说明：\n\n1. 正确性 — 逻辑是否正确，是否有明显 bug，边界情况是否处理\n2. 安全性 — 是否有密钥/token 硬编码，输入是否做了校验，是否有注入风险\n3. 架构合理性 — 是否符合项目现有架构（LangGraph 多 Agent 模式），模块职责是否清晰\n4. 类型安全 — TypeScript 类型是否严谨，是否有滥用 any 或不必要的类型断言\n5. 错误处理 — 异常是否被正确捕获和处理，是否有合理的 fallback\n6. 性能 — 是否有明显的性能问题，如不必要的重复调用、阻塞操作\n\n最后一行必须是以下之一（不含其他文字）：\nVERDICT: APPROVE\nVERDICT: REQUEST_CHANGES\n\n判断标准：存在 ❌ 必须修复的问题时输出 REQUEST_CHANGES，否则输出 APPROVE。")
                }
              ]
            }')

          response=$(curl -s https://api.deepseek.com/chat/completions \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$payload")

          echo "DeepSeek response: $response"

          summary=$(echo "$response" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          choices = data.get('choices', [])
          if choices:
              print(choices[0].get('message', {}).get('content', 'No content'))
          else:
              print('No choices in response. Raw: ' + str(data))
          " 2>/dev/null || echo "Failed to parse response")

          if echo "$summary" | grep -q "VERDICT: APPROVE"; then
            echo "approved=true" >> $GITHUB_OUTPUT
          else
            echo "approved=false" >> $GITHUB_OUTPUT
          fi

          short_summary=$(echo "$summary" | head -c 3000)
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$short_summary" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SUMMARY: ${{ steps.review.outputs.summary }}
          APPROVED: ${{ steps.review.outputs.approved }}
        run: |
          if [[ "$APPROVED" == "true" ]]; then
            icon="✅"
            status="**APPROVED** — 代码通过审查，准备合并"
          else
            icon="❌"
            status="**REQUEST CHANGES** — 发现问题，请修复后重新推送"
          fi

          body="## $icon DeepSeek 代码审查

          $status

          ---

          $SUMMARY

          ---
          *🤖 由 deepseek-v4-pro 自动审查*"

          if [[ "$APPROVED" == "true" ]]; then
            gh pr review "$PR_NUMBER" --repo "$REPO" --approve --body "$body" 2>/dev/null || \
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$body"
          else
            gh pr review "$PR_NUMBER" --repo "$REPO" --request-changes --body "$body" 2>/dev/null || \
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$body"
          fi

  # ──────────────────────────────────────────────
  # 2. 自动 Merge（仅审查通过时）
  # ──────────────────────────────────────────────
  auto-merge:
    name: Auto Merge
    runs-on: ubuntu-latest
    needs: deepseek-review
    if: needs.deepseek-review.outputs.approved == 'true'
    steps:
      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --repo "$REPO" \
            --squash \
            --admin \
            --body "Auto-merged after DeepSeek review ✅"

          echo "✅ PR #$PR_NUMBER merged"
