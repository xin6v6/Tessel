name: Deploy to Mac Agent

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      # ── 质量关卡（在宿主机 Bun 上直接运行，无需 Docker）───────────
      - name: 安装依赖
        run: bun install --frozen-lockfile

      - name: 类型检查
        run: bun run typecheck

      - name: 运行测试
        run: bun test

      # ── 写入 .env（内容来自 GitHub Secret，不进代码库）────────────
      - name: 生成 .env 文件
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          echo "$ENV_FILE" > .env
          chmod 600 .env
          echo "✅ .env 已生成（$(wc -l < .env) 行）"

      # ── Docker 构建与滚动部署 ─────────────────────────────────────
      - name: 构建 Docker 镜像
        run: |
          # --no-cache 确保每次 CI 都拉取最新基础层（避免缓存旧 bun 基础镜像）
          # 如构建速度优先于镜像新鲜度，可改为 docker compose build（使用缓存）
          docker compose build --no-cache

      - name: 滚动重启容器
        run: |
          # up -d 是幂等的：
          #   - 容器已运行 → 以新镜像原地替换（~1-2s 停机，Slack 会在重连后补发事件）
          #   - 容器不存在 → 直接创建并启动
          docker compose up -d

      - name: 健康检查
        run: |
          echo "等待容器健康检查..."
          MAX=12
          for i in $(seq 1 $MAX); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' synod 2>/dev/null || echo "no-healthcheck")
            RUNNING=$(docker inspect --format='{{.State.Running}}' synod 2>/dev/null || echo "false")

            echo "  [$i/$MAX] running=$RUNNING health=$STATUS"

            # 如果容器有 HEALTHCHECK 且已通过
            if [[ "$STATUS" == "healthy" ]]; then
              echo "✅ 容器健康检查通过"
              break
            fi

            # 如果健康检查明确失败
            if [[ "$STATUS" == "unhealthy" ]]; then
              echo "❌ 容器健康检查失败"
              docker compose logs --tail=50 synod
              exit 1
            fi

            # 容器无 HEALTHCHECK（no-healthcheck）：退回到运行状态检查
            if [[ "$STATUS" == "no-healthcheck" && "$RUNNING" == "true" ]]; then
              echo "✅ 容器正在运行（无 HEALTHCHECK 配置）"
              break
            fi

            # 容器未运行
            if [[ "$RUNNING" != "true" && $i -eq $MAX ]]; then
              echo "❌ 容器未能正常启动"
              docker compose logs --tail=50 synod
              exit 1
            fi

            sleep 5
          done

      - name: 确认服务运行
        run: |
          echo "── 容器状态 ──"
          docker compose ps

          echo ""
          echo "── 最近日志（20 行）──"
          docker compose logs --tail=20 synod

          echo ""
          # 检查 Slack Socket Mode 是否已连接
          if docker compose logs --tail=100 synod 2>/dev/null | grep -q "Socket Mode connected\|Socket connected\|已连接"; then
            echo "✅ Slack Socket Mode 连接正常"
          else
            echo "⚠️  未检测到 Socket Mode 连接日志（可能仍在初始化，属正常）"
          fi
