name: Deploy to Mac Agent

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: 拉取代码
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT }}

      # ── 质量关卡 ──────────────────────────────────────────────────
      # bun install：lockfile 未变时本地缓存命中，几乎瞬间完成
      - name: 安装依赖
        run: bun install --frozen-lockfile

      - name: 类型检查 & 测试
        run: |
          bun run typecheck & TPID=$!
          # 测试输出写到文件，避免 stub/fixture 日志污染 CI 输出
          # 失败时再打印内容，方便排查
          LOG_FILE_LEVEL=silent bun test > /tmp/bun-test.log 2>&1 & TSPID=$!
          wait $TPID || exit $?
          wait $TSPID || { echo "❌ 测试失败："; cat /tmp/bun-test.log; exit 1; }

      # ── 写入 .env ─────────────────────────────────────────────────
      - name: 生成 .env 文件
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          echo "$ENV_FILE" > .env
          chmod 600 .env
          echo "✅ .env 已生成（$(wc -l < .env) 行）"

      # ── 拉基础镜像（本地已有则跳过，避免每次请求 registry）────────
      - name: 拉取基础镜像
        run: |
          BUN_IMAGE="oven/bun:1.3.11-alpine"
          if docker image inspect "$BUN_IMAGE" &>/dev/null; then
            echo "✅ 本地镜像已存在，跳过拉取"
          else
            echo "本地无缓存，拉取 $BUN_IMAGE..."
            for i in 1 2 3; do
              docker pull "$BUN_IMAGE" && break
              [ $i -lt 3 ] && echo "第 $i 次失败，10s 后重试..." && sleep 10
            done
          fi
          # 预拉取失败不阻断流程，docker compose build 会自行处理
          true

      # ── 构建 & 滚动部署 ───────────────────────────────────────────
      - name: 构建 Docker 镜像
        run: docker compose build

      - name: 滚动重启容器
        run: docker compose up -d

      # ── 健康检查（tessel + ui 并行轮询）───────────────────────────
      - name: 健康检查
        run: |
          check_container() {
            local name=$1
            local max=$2
            for i in $(seq 1 $max); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$name" 2>/dev/null || echo "no-healthcheck")
              RUNNING=$(docker inspect --format='{{.State.Running}}' "$name" 2>/dev/null || echo "false")
              echo "  [$name $i/$max] running=$RUNNING health=$STATUS"
              [[ "$STATUS" == "healthy" ]]  && echo "✅ $name healthy" && return 0
              [[ "$STATUS" == "unhealthy" ]] && echo "❌ $name unhealthy" && docker compose logs --tail=30 "$name" && return 1
              [[ "$STATUS" == "no-healthcheck" && "$RUNNING" == "true" ]] && echo "✅ $name running" && return 0
              [[ "$RUNNING" != "true" && $i -eq $max ]] && echo "❌ $name failed to start" && docker compose logs --tail=30 "$name" && return 1
              sleep 3
            done
          }

          check_container tessel    10 & PID1=$!
          check_container tessel-ui  8 & PID2=$!
          wait $PID1 || exit $?
          wait $PID2 || exit $?

      # ── 确认服务运行 ──────────────────────────────────────────────
      - name: 确认服务运行
        run: |
          docker compose ps

          echo ""
          docker compose logs --tail=15 tessel

          echo ""
          docker compose logs --tail=8 ui

          echo ""
          if docker compose logs --since=2m tessel 2>/dev/null | grep -q "Socket Mode connected\|Socket connected\|已连接"; then
            echo "✅ Slack Socket Mode 连接正常"
          else
            echo "⚠️  未检测到 Socket Mode 连接日志（可能仍在初始化）"
          fi

          HOST_IP=$(hostname -I 2>/dev/null | awk '{print $1}' || echo "your-server-ip")
          echo "🌐 Log Viewer: http://${HOST_IP}:3456/logs"
