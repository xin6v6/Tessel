name: Deploy to Mac Agent

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      # ── 质量关卡（在宿主机 Bun 上直接运行，无需 Docker）───────────
      - name: 安装依赖
        run: bun install --frozen-lockfile

      - name: 类型检查
        run: bun run typecheck

      - name: 运行测试
        run: bun test

      # ── 写入 .env（内容来自 GitHub Secret，不进代码库）────────────
      - name: 生成 .env 文件
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          echo "$ENV_FILE" > .env
          chmod 600 .env
          echo "✅ .env 已生成（$(wc -l < .env) 行）"

      # ── 确保日志目录存在（volume 挂载点必须先建好）──────────────
      - name: 准备数据目录
        run: mkdir -p data/logs

      # ── Docker 构建与滚动部署 ─────────────────────────────────────
      - name: 构建 Docker 镜像
        run: |
          # 同时构建 synod + ui 两个镜像
          docker compose build --no-cache

      - name: 滚动重启容器
        run: |
          # up -d 是幂等的：已运行 → 原地替换，不存在 → 创建启动
          docker compose up -d

      # ── 健康检查：agent ───────────────────────────────────────────
      - name: 健康检查 (synod)
        run: |
          echo "等待 synod 容器就绪..."
          MAX=12
          for i in $(seq 1 $MAX); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' synod 2>/dev/null || echo "no-healthcheck")
            RUNNING=$(docker inspect --format='{{.State.Running}}' synod 2>/dev/null || echo "false")
            echo "  [$i/$MAX] running=$RUNNING health=$STATUS"

            if [[ "$STATUS" == "healthy" ]]; then
              echo "✅ synod 健康检查通过"; break
            fi
            if [[ "$STATUS" == "unhealthy" ]]; then
              echo "❌ synod 健康检查失败"
              docker compose logs --tail=50 synod; exit 1
            fi
            if [[ "$STATUS" == "no-healthcheck" && "$RUNNING" == "true" ]]; then
              echo "✅ synod 正在运行（无 HEALTHCHECK）"; break
            fi
            if [[ "$RUNNING" != "true" && $i -eq $MAX ]]; then
              echo "❌ synod 未能正常启动"
              docker compose logs --tail=50 synod; exit 1
            fi
            sleep 5
          done

      # ── 健康检查：UI ──────────────────────────────────────────────
      - name: 健康检查 (synod-ui)
        run: |
          echo "等待 synod-ui 容器就绪..."
          MAX=8
          for i in $(seq 1 $MAX); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' synod-ui 2>/dev/null || echo "no-healthcheck")
            RUNNING=$(docker inspect --format='{{.State.Running}}' synod-ui 2>/dev/null || echo "false")
            echo "  [$i/$MAX] running=$RUNNING health=$STATUS"

            if [[ "$STATUS" == "healthy" ]]; then
              echo "✅ synod-ui 健康检查通过"; break
            fi
            if [[ "$STATUS" == "unhealthy" ]]; then
              echo "❌ synod-ui 健康检查失败"
              docker compose logs --tail=30 ui; exit 1
            fi
            if [[ "$STATUS" == "no-healthcheck" && "$RUNNING" == "true" ]]; then
              echo "✅ synod-ui 正在运行"; break
            fi
            if [[ "$RUNNING" != "true" && $i -eq $MAX ]]; then
              echo "❌ synod-ui 未能正常启动"
              docker compose logs --tail=30 ui; exit 1
            fi
            sleep 5
          done

      # ── 确认服务运行 ──────────────────────────────────────────────
      - name: 确认服务运行
        run: |
          echo "── 容器状态 ──"
          docker compose ps

          echo ""
          echo "── synod 最近日志（20 行）──"
          docker compose logs --tail=20 synod

          echo ""
          echo "── ui 最近日志（10 行）──"
          docker compose logs --tail=10 ui

          echo ""
          # 检查 Slack Socket Mode 是否已连接
          if docker compose logs --tail=100 synod 2>/dev/null | grep -q "Socket Mode connected\|Socket connected\|已连接"; then
            echo "✅ Slack Socket Mode 连接正常"
          else
            echo "⚠️  未检测到 Socket Mode 连接日志（可能仍在初始化，属正常）"
          fi

          # 获取宿主机 IP，打印访问地址
          HOST_IP=$(hostname -I 2>/dev/null | awk '{print $1}' || echo "your-server-ip")
          echo ""
          echo "🌐 Log Viewer: http://${HOST_IP}:3456/logs"
