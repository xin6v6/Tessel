<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tessel · Log Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { mono: ['JetBrains Mono', 'Fira Code', 'Consolas', 'monospace'] }
        }
      }
    }
  </script>
  <style>
    body { background: #0d1117; color: #e6edf3; }
    .log-line { font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace; font-size: 12px; line-height: 1.6; }
    .level-fatal  { color: #ff6b6b; background: rgba(255,107,107,0.1); }
    .level-error  { color: #f85149; }
    .level-warn   { color: #d29922; }
    .level-info   { color: #3fb950; }
    .level-debug  { color: #58a6ff; }
    .level-trace  { color: #8b949e; }
    .level-badge  { display: inline-block; padding: 0 6px; border-radius: 3px; font-weight: 700; font-size: 10px; min-width: 48px; text-align: center; }
    .badge-fatal  { background: #ff6b6b; color: #0d1117; }
    .badge-error  { background: #f85149; color: #0d1117; }
    .badge-warn   { background: #d29922; color: #0d1117; }
    .badge-info   { background: #3fb950; color: #0d1117; }
    .badge-debug  { background: #1f6feb; color: #fff; }
    .badge-trace  { background: #30363d; color: #8b949e; }
    #log-container { height: calc(100vh - 120px); overflow-y: auto; scroll-behavior: smooth; }
    #log-container::-webkit-scrollbar { width: 6px; }
    #log-container::-webkit-scrollbar-track { background: #161b22; }
    #log-container::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    .chip { display: inline-block; padding: 1px 8px; border-radius: 12px; font-size: 10px; font-family: monospace; }
    .chip-session { background: #1f2d3d; color: #58a6ff; border: 1px solid #1f6feb44; }
    .chip-source  { background: #1f2d1f; color: #3fb950; border: 1px solid #3fb95044; }
    .chip-agent   { background: #2d1f2d; color: #bc8cff; border: 1px solid #bc8cff44; }
    .toolbar { background: #161b22; border-bottom: 1px solid #30363d; }
    .filter-btn { padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; }
    .filter-btn.active { border-color: currentColor; }
    .filter-btn:hover { opacity: 0.8; }
    .conn-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .conn-dot.connected { background: #3fb950; box-shadow: 0 0 6px #3fb950; }
    .conn-dot.disconnected { background: #f85149; }
    .conn-dot.connecting { background: #d29922; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .search-input { background: #0d1117; border: 1px solid #30363d; color: #e6edf3; padding: 4px 10px; border-radius: 4px; font-size: 12px; width: 200px; outline: none; }
    .search-input:focus { border-color: #58a6ff; }
    .highlight { background: #f0e03040; border-radius: 2px; }
    .json-toggle { cursor: pointer; color: #58a6ff; font-size: 10px; margin-left: 6px; }
    .json-expand { background: #161b22; border-left: 2px solid #30363d; margin-left: 2px; padding: 4px 8px; white-space: pre; font-size: 11px; color: #8b949e; }
  </style>
</head>
<body>
  <!-- Toolbar -->
  <div class="toolbar px-4 py-2 flex items-center gap-3 flex-wrap">
    <div class="flex items-center gap-2">
      <span class="conn-dot connecting" id="conn-dot"></span>
      <span class="text-xs text-gray-400" id="conn-status">连接中...</span>
    </div>
    <div class="w-px h-4 bg-gray-600"></div>
    <span class="text-xs text-gray-400">筛选级别:</span>
    <div class="flex gap-1" id="level-filters">
      <button class="filter-btn active" data-level="all" style="color:#8b949e">全部</button>
      <button class="filter-btn" data-level="fatal" style="color:#ff6b6b">FATAL</button>
      <button class="filter-btn" data-level="error" style="color:#f85149">ERROR</button>
      <button class="filter-btn" data-level="warn"  style="color:#d29922">WARN</button>
      <button class="filter-btn" data-level="info"  style="color:#3fb950">INFO</button>
      <button class="filter-btn" data-level="debug" style="color:#58a6ff">DEBUG</button>
      <button class="filter-btn" data-level="trace" style="color:#8b949e">TRACE</button>
    </div>
    <div class="w-px h-4 bg-gray-600"></div>
    <span class="text-xs text-gray-400">日期:</span>
    <select id="date-select" class="search-input" style="width:auto;min-width:140px">
      <option value="">今天 (实时)</option>
    </select>
    <div class="w-px h-4 bg-gray-600"></div>
    <input class="search-input" id="search-input" type="text" placeholder="搜索日志..." />
    <div class="flex-1"></div>
    <span class="text-xs text-gray-500" id="log-count">0 条</span>
    <button onclick="clearLogs()" class="text-xs text-gray-500 hover:text-red-400 transition-colors px-2 py-1 rounded border border-gray-700 hover:border-red-700">清空</button>
    <label class="flex items-center gap-1 text-xs text-gray-400 cursor-pointer">
      <input type="checkbox" id="auto-scroll" checked class="w-3 h-3" />
      自动滚动
    </label>
  </div>

  <!-- Log area -->
  <div id="log-container" class="px-2 py-1">
    <div id="log-lines"></div>
    <div id="log-end"></div>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────────────
    let allLogs = [];
    let activeLevel = 'all';
    let searchTerm = '';
    let eventSource = null;
    let reconnectTimer = null;
    let viewingDate = ''; // '' = today/live, 'YYYY-MM-DD' = historical snapshot

    const levelOrder = { fatal: 1, error: 2, warn: 3, info: 4, debug: 5, trace: 6 };

    // ── DOM refs ───────────────────────────────────────────────────
    const logLines    = document.getElementById('log-lines');
    const logEnd      = document.getElementById('log-end');
    const connDot     = document.getElementById('conn-dot');
    const connStatus  = document.getElementById('conn-status');
    const logCount    = document.getElementById('log-count');
    const autoScroll  = document.getElementById('auto-scroll');
    const searchInput = document.getElementById('search-input');
    const dateSelect  = document.getElementById('date-select');

    // ── Render ─────────────────────────────────────────────────────
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function highlight(str, term) {
      if (!term) return escapeHtml(str);
      const escaped = escapeHtml(str);
      const re = new RegExp(escapeHtml(term).replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      return escaped.replace(re, m => `<span class="highlight">${m}</span>`);
    }

    function formatTime(iso) {
      const d = new Date(iso);
      return d.toLocaleTimeString('zh-CN', { hour12: false }) + '.' + String(d.getMilliseconds()).padStart(3, '0');
    }

    function makeRow(entry, idx) {
      const level = entry.level || 'info';
      const extras = Object.entries(entry)
        .filter(([k]) => !['timestamp','level','logger','sessionId','userId','source','agentName','message','file','line'].includes(k))
        .map(([k,v]) => `<span class="text-gray-600">${escapeHtml(k)}=</span><span class="text-gray-300">${escapeHtml(typeof v === 'object' ? JSON.stringify(v) : String(v))}</span>`)
        .join(' ');

      const chips = [
        entry.source    ? `<span class="chip chip-source">${escapeHtml(entry.source)}</span>` : '',
        entry.agentName ? `<span class="chip chip-agent">${escapeHtml(entry.agentName)}</span>` : '',
        entry.sessionId ? `<span class="chip chip-session">${escapeHtml(entry.sessionId.slice(0,8))}</span>` : '',
      ].filter(Boolean).join(' ');

      const hasExtras = extras || (entry.file && entry.line);
      const jsonStr = hasExtras ? JSON.stringify(entry, null, 2) : null;

      return `
        <div class="log-line level-${level} px-2 py-0.5 rounded hover:bg-white/5 group" data-idx="${idx}" data-level="${level}">
          <span class="text-gray-600">${formatTime(entry.timestamp)}</span>
          <span class="level-badge badge-${level} mx-1">${level.toUpperCase()}</span>
          <span class="text-gray-500">[${escapeHtml(entry.logger || '')}]</span>
          ${chips ? ' ' + chips : ''}
          <span class="ml-1">${highlight(entry.message, searchTerm)}</span>
          ${extras ? `<span class="ml-2 opacity-60">${extras}</span>` : ''}
          ${entry.file && entry.line ? `<span class="text-gray-600 ml-2 text-xs">${escapeHtml(entry.file)}:${entry.line}</span>` : ''}
          ${jsonStr ? `<span class="json-toggle" onclick="toggleJson(${idx})">···</span>` : ''}
        </div>
        ${jsonStr ? `<div class="json-expand hidden" id="json-${idx}">${escapeHtml(jsonStr)}</div>` : ''}
      `;
    }

    function toggleJson(idx) {
      const el = document.getElementById(`json-${idx}`);
      if (el) el.classList.toggle('hidden');
    }

    function passesFilter(entry) {
      if (activeLevel !== 'all') {
        if ((levelOrder[entry.level] || 99) > (levelOrder[activeLevel] || 99)) return false;
      }
      if (searchTerm) {
        const haystack = JSON.stringify(entry).toLowerCase();
        if (!haystack.includes(searchTerm.toLowerCase())) return false;
      }
      return true;
    }

    function renderAll() {
      const filtered = allLogs.filter(passesFilter);
      logLines.innerHTML = filtered.map((e, i) => makeRow(e, allLogs.indexOf(e))).join('');
      logCount.textContent = `${filtered.length} / ${allLogs.length} 条`;
      if (autoScroll.checked) logEnd.scrollIntoView();
    }

    function appendEntry(entry) {
      allLogs.push(entry);
      if (passesFilter(entry)) {
        const idx = allLogs.length - 1;
        logLines.insertAdjacentHTML('beforeend', makeRow(entry, idx));
        logCount.textContent = `${logLines.querySelectorAll('[data-idx]').length} / ${allLogs.length} 条`;
        if (autoScroll.checked) logEnd.scrollIntoView();
      }
    }

    function clearLogs() {
      allLogs = [];
      logLines.innerHTML = '';
      logCount.textContent = '0 条';
    }

    // ── Level filter buttons ───────────────────────────────────────
    document.querySelectorAll('#level-filters .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#level-filters .filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeLevel = btn.dataset.level;
        renderAll();
      });
    });

    // ── Search ─────────────────────────────────────────────────────
    let searchDebounce;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(() => {
        searchTerm = searchInput.value;
        renderAll();
      }, 200);
    });

    // ── Date selector: historical log loading ─────────────────────
    async function loadDateList() {
      try {
        const res = await fetch('/api/logs/dates');
        const { dates } = await res.json();
        const today = new Date().toISOString().slice(0, 10);
        // Keep the "今天 (实时)" option, append historical dates (skip today)
        for (const d of dates) {
          if (d === today) continue;
          const opt = document.createElement('option');
          opt.value = d;
          opt.textContent = d;
          dateSelect.appendChild(opt);
        }
      } catch (e) {
        console.error('Failed to load date list', e);
      }
    }

    async function loadHistoricalLogs(date) {
      try {
        const res = await fetch(`/api/logs?date=${encodeURIComponent(date)}`);
        const data = await res.json();
        allLogs = data.entries || [];
        renderAll();
      } catch (e) {
        console.error('Failed to load logs for', date, e);
        allLogs = [];
        renderAll();
      }
    }

    function disconnectStream() {
      if (eventSource) { eventSource.close(); eventSource = null; }
      clearTimeout(reconnectTimer);
    }

    dateSelect.addEventListener('change', () => {
      viewingDate = dateSelect.value;
      allLogs = [];
      logLines.innerHTML = '';
      if (viewingDate) {
        // Historical view — stop live stream, load full day
        disconnectStream();
        setStatus('disconnected');
        connStatus.textContent = `历史: ${viewingDate}`;
        loadHistoricalLogs(viewingDate);
      } else {
        // Back to live view
        connect();
      }
    });

    // ── SSE connection ─────────────────────────────────────────────
    function setStatus(state) {
      connDot.className = 'conn-dot ' + state;
      const labels = { connected: '已连接', disconnected: '已断开', connecting: '连接中...' };
      connStatus.textContent = labels[state] || state;
    }

    function connect() {
      if (eventSource) { eventSource.close(); eventSource = null; }
      setStatus('connecting');

      eventSource = new EventSource('/api/logs/stream');

      eventSource.addEventListener('open', () => {
        setStatus('connected');
        clearTimeout(reconnectTimer);
      });

      eventSource.addEventListener('log', (e) => {
        try {
          const entry = JSON.parse(e.data);
          appendEntry(entry);
        } catch {}
      });

      eventSource.addEventListener('history', (e) => {
        try {
          const entries = JSON.parse(e.data);
          allLogs = entries;
          renderAll();
        } catch {}
      });

      eventSource.addEventListener('error', () => {
        setStatus('disconnected');
        eventSource.close();
        eventSource = null;
        reconnectTimer = setTimeout(connect, 3000);
      });
    }

    loadDateList();
    connect();
  </script>
</body>
</html>
