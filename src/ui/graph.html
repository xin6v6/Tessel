<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Synod · Agent Graph</title>
<style>
  :root {
    --bg: #080c14;
    --surface: #0d1420;
    --border: rgba(255,255,255,0.06);
    --text: #e2e8f0;
    --muted: #4a5568;
    --supervisor: #7c6af7;
    --agent: #34d399;
    --external: #f6993f;
    --entry: #3d4f6b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ─────────────────────────────────────── */
  header {
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    background: rgba(8,12,20,0.8);
    z-index: 10;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--supervisor), #5b8af5);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }

  .logo h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.2px;
    color: #f1f5f9;
  }

  .logo span {
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
  }

  .legend {
    display: flex;
    gap: 18px;
    align-items: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  /* ── Workspace ───────────────────────────────────── */
  .workspace {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  #canvas {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ── Nodes ───────────────────────────────────────── */
  .node-group {
    cursor: pointer;
  }

  .node-bg {
    transition: opacity 0.2s;
  }

  .node-group:hover .node-ring { opacity: 1 !important; }
  .node-group.selected .node-ring { opacity: 1 !important; }
  .node-group.selected .node-main { filter: brightness(1.15); }

  .node-label-main {
    font-size: 13px;
    font-weight: 600;
    fill: #fff;
    text-anchor: middle;
    dominant-baseline: middle;
    pointer-events: none;
    letter-spacing: -0.2px;
  }

  .node-label-sub {
    font-size: 10px;
    font-weight: 400;
    fill: rgba(255,255,255,0.5);
    text-anchor: middle;
    pointer-events: none;
  }

  /* ── Edges ───────────────────────────────────────── */
  .edge { fill: none; }

  .edge-label-bg {
    fill: var(--bg);
  }

  .edge-label-text {
    font-size: 10.5px;
    fill: #4a5568;
    text-anchor: middle;
    dominant-baseline: middle;
    pointer-events: none;
    font-weight: 500;
  }

  /* ── Panel ───────────────────────────────────────── */
  #panel {
    width: 360px;
    flex-shrink: 0;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.22s cubic-bezier(0.4,0,0.2,1);
    position: absolute;
    right: 0; top: 0; bottom: 0;
  }

  #panel.open {
    transform: translateX(0);
  }

  .panel-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .panel-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .panel-meta { flex: 1; }

  .panel-name {
    font-size: 15px;
    font-weight: 600;
    color: #f1f5f9;
    line-height: 1.3;
  }

  .panel-type {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .panel-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    width: 28px; height: 28px;
    border-radius: 6px;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .panel-close:hover {
    border-color: rgba(255,255,255,0.15);
    color: var(--text);
  }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    scrollbar-width: thin;
    scrollbar-color: #1e2535 transparent;
  }

  .panel-section-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .panel-prompt {
    font-family: "SF Mono", "Fira Code", "JetBrains Mono", monospace;
    font-size: 12px;
    line-height: 1.8;
    color: #8b9cba;
    white-space: pre-wrap;
    word-break: break-word;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }

  .panel-prompt em {
    color: #7c6af7;
    font-style: normal;
    font-weight: 600;
  }

  .panel-empty {
    color: var(--muted);
    font-size: 13px;
    font-style: italic;
    text-align: center;
    padding: 40px 0;
  }

  /* ── Hint ───────────────────────────────────────── */
  .hint {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: var(--muted);
    pointer-events: none;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(13,20,32,0.8);
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    backdrop-filter: blur(8px);
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <h1>Synod <span>· Agent Graph</span></h1>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--supervisor)"></div>Supervisor</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--agent)"></div>Sub Agent</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--external)"></div>External</div>
    <div class="legend-item"><div class="legend-dot" style="background:#38bdf8"></div>Tool</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f472b6"></div>State / Memory</div>
    <div class="legend-item">
      <svg width="22" height="8" viewBox="0 0 22 8"><line x1="0" y1="4" x2="22" y2="4" stroke="#4a5568" stroke-width="1.5"/></svg>
      主流程
    </div>
    <div class="legend-item">
      <svg width="22" height="8" viewBox="0 0 22 8"><line x1="0" y1="4" x2="22" y2="4" stroke="#2d3f5a" stroke-width="1.5" stroke-dasharray="4,3"/></svg>
      条件/回调
    </div>
  </div>
</header>

<div class="workspace">
  <div id="canvas">
    <svg id="svg" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Glow filters -->
        <filter id="glow-supervisor" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-agent" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Grid pattern -->
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
          <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="0.5"/>
        </pattern>
        <!-- Arrow markers -->
        <marker id="arr-solid" markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto">
          <path d="M1,1 L6,3.5 L1,6 Z" fill="#3d4f6b"/>
        </marker>
        <marker id="arr-dashed" markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto">
          <path d="M1,1 L6,3.5 L1,6 Z" fill="#1e2d45"/>
        </marker>
        <!-- Radial gradients for nodes -->
        <radialGradient id="grad-supervisor" cx="40%" cy="35%" r="60%">
          <stop offset="0%" stop-color="#9d8ef9"/>
          <stop offset="100%" stop-color="#5b4ed4"/>
        </radialGradient>
        <radialGradient id="grad-agent" cx="40%" cy="35%" r="60%">
          <stop offset="0%" stop-color="#4fe8a8"/>
          <stop offset="100%" stop-color="#1aaa70"/>
        </radialGradient>
        <radialGradient id="grad-external" cx="40%" cy="35%" r="60%">
          <stop offset="0%" stop-color="#f9b55a"/>
          <stop offset="100%" stop-color="#d4781a"/>
        </radialGradient>
        <radialGradient id="grad-entry" cx="40%" cy="35%" r="60%">
          <stop offset="0%" stop-color="#5a6f8a"/>
          <stop offset="100%" stop-color="#2d3f55"/>
        </radialGradient>
        <radialGradient id="grad-tool" cx="40%" cy="35%" r="60%">
          <stop offset="0%" stop-color="#7dd3fc"/>
          <stop offset="100%" stop-color="#0369a1"/>
        </radialGradient>
        <radialGradient id="grad-state" cx="40%" cy="35%" r="60%">
          <stop offset="0%" stop-color="#f9a8d4"/>
          <stop offset="100%" stop-color="#be185d"/>
        </radialGradient>
      </defs>

      <!-- Background grid -->
      <rect width="100%" height="100%" fill="url(#grid)"/>

      <g id="edges-layer"></g>
      <g id="nodes-layer"></g>
    </svg>

    <div class="hint">点击节点查看提示词</div>
  </div>

  <div id="panel">
    <div class="panel-header">
      <div class="panel-icon" id="panel-icon"></div>
      <div class="panel-meta">
        <div class="panel-name" id="panel-name"></div>
        <div class="panel-type" id="panel-type"></div>
      </div>
      <button class="panel-close" id="panel-close">×</button>
    </div>
    <div class="panel-body">
      <div class="panel-section-title">Prompt / 说明</div>
      <pre class="panel-prompt" id="panel-prompt" style="display:none"></pre>
      <div class="panel-empty" id="panel-empty" style="display:none">该节点暂无说明</div>
    </div>
  </div>
</div>

<script>
// ─── Data ────────────────────────────────────────────────────────

const COLORS = {
  supervisor: 'url(#grad-supervisor)',
  agent:      'url(#grad-agent)',
  external:   'url(#grad-external)',
  tool:       'url(#grad-tool)',
  state:      'url(#grad-state)',
  entry:      'url(#grad-entry)',
  end:        'url(#grad-entry)',
};

const RING_COLORS = {
  supervisor: 'rgba(124,106,247,0.3)',
  agent:      'rgba(52,211,153,0.3)',
  external:   'rgba(246,153,63,0.3)',
  tool:       'rgba(56,189,248,0.3)',
  state:      'rgba(244,114,182,0.3)',
  entry:      'rgba(61,79,107,0.3)',
  end:        'rgba(61,79,107,0.3)',
};

const ICON = {
  supervisor: '🧠',
  agent:      '🤖',
  external:   '⚡',
  tool:       '🔧',
  state:      '💾',
  entry:      '▶',
  end:        '⏹',
};

const TYPE_LABEL = {
  supervisor: 'Conversation Agent',
  agent:      'Sub-Agent',
  external:   'External Service',
  tool:       'Tool',
  state:      'State / Memory',
  entry:      'Graph Entry',
  end:        'Graph Exit',
};

const NODES = [
  // ── 主流程
  {
    id: 'slack_in',
    label: 'Slack API',
    sublabel: '消息入站',
    type: 'external',
    r: 36,
    prompt:
`消息入站

触发
  用户在 Slack 发送 @mention 或消息

流程
  Socket Mode WebSocket 收到事件
  → SlackReceiver.onMention / onMessage
  → 封装为 HumanMessage
  → graph.invoke({ messages, userId, channelId })

携带信息
  message   用户消息文本
  userId    发送者 ID
  channelId 频道 ID
  threadTs  Thread 时间戳（用于回复）

文件  src/integrations/slack/receiver.ts`,
  },
  {
    id: 'start',
    label: 'START',
    type: 'entry',
    r: 24,
  },
  {
    id: 'supervisor',
    label: 'Supervisor',
    sublabel: 'Conversation Agent',
    type: 'supervisor',
    r: 50,
    prompt:
`角色
  核心对话 Agent，单次对话，无内部循环。
  从 Memory 读取上下文，调用工具，生成回复。

系统提示
  你是一个智能个人助手。
  结合历史记忆理解用户意图，
  使用合适的工具完成任务，用自然语言回复。

执行步骤（单次）
  1. 从 Memory Store 加载该用户的对话历史
  2. LLM 推理：判断是否需要调用工具
  3. 若需要 → 调用工具 → 获取结果 → 再次推理
  4. 生成最终回复
  5. 将本轮对话写回 Memory Store

可用工具
  Web Search  — 实时网络搜索（待接入）
  MCP Tools   — 文件/数据库/日历等（待接入）

文件  src/graph/nodes/supervisor.ts`,
  },
  {
    id: 'end',
    label: 'END',
    type: 'end',
    r: 24,
  },
  {
    id: 'slack_out',
    label: 'Slack API',
    sublabel: '消息回复',
    type: 'external',
    r: 36,
    prompt:
`消息回复

流程
  Supervisor 生成回复文本
  → graph 执行完毕，返回结果
  → SlackReceiver 调用 say()
  → chat.postMessage() 发送到原 Thread

SDK   @slack/web-api
方法  chat.postMessage({ channel, text, thread_ts })

文件  src/integrations/slack/receiver.ts`,
  },

  // ── 状态 / 记忆（横向主流程下方）
  {
    id: 'state',
    label: 'Graph State',
    sublabel: '本轮上下文',
    type: 'state',
    r: 34,
    prompt:
`Graph State（单次对话上下文）

内容
  messages     本轮完整消息列表（HumanMessage + AIMessage + ToolMessage）
  userId       当前用户 ID
  channelId    当前频道 ID
  threadTs     Thread 时间戳

生命周期
  随 graph.invoke() 创建，随调用结束销毁。
  不跨对话持久化（持久化由 Memory Store 负责）。

实现
  LangGraph Annotation（src/graph/state.ts）`,
  },
  {
    id: 'memory',
    label: 'Memory Store',
    sublabel: '跨会话记忆',
    type: 'state',
    r: 34,
    prompt:
`Memory Store（跨会话持久化记忆）

内容
  per-user 对话历史摘要
  用户偏好、常用设置
  任务上下文（待办、进度等）

读写时机
  读：Supervisor 处理消息前，加载历史
  写：Supervisor 生成回复后，追加本轮记录

当前实现
  MemoryStore（in-memory KV，重启丢失）
  src/memory/index.ts

待升级
  SQLite（bun:sqlite）— 本地持久化
  Redis（Bun.redis）  — 分布式

文件  src/memory/index.ts`,
  },

  // ── 工具
  {
    id: 'web_search',
    label: 'Web Search',
    sublabel: 'Tool · 待接入',
    type: 'tool',
    r: 30,
    prompt:
`工具  Web Search（待接入）

候选方案
  Tavily Search API   — LangChain 原生
  Brave Search API    — 隐私友好
  SerpAPI             — Google 结果

接入方式
  注册到 ToolRegistry → Supervisor 直接调用`,
  },
  {
    id: 'mcp',
    label: 'MCP Tools',
    sublabel: 'Tool · 待接入',
    type: 'tool',
    r: 30,
    prompt:
`工具  MCP（Model Context Protocol）待接入

候选 MCP Server
  filesystem   — 读写本地文件
  github       — 仓库操作
  notion       — 笔记管理
  postgres     — 数据库查询

接入方式
  @langchain/mcp-adapters 转为 LangChain Tool`,
  },
];

const EDGES = [
  // ── 主流程（横向，单向，无循环）
  { from: 'slack_in',   to: 'start',       style: 'solid' },
  { from: 'start',      to: 'supervisor',  style: 'solid',  label: 'HumanMessage' },
  { from: 'supervisor', to: 'end',         style: 'solid',  label: 'AIMessage' },
  { from: 'end',        to: 'slack_out',   style: 'solid' },

  // ── Supervisor ↔ Memory（读写）
  { from: 'memory',     to: 'supervisor',  style: 'dashed', label: '加载历史' },
  { from: 'supervisor', to: 'memory',      style: 'dashed', label: '写入记录', curve: true },

  // ── Supervisor → State（持有）
  { from: 'supervisor', to: 'state',       style: 'dashed', label: '读写 State' },

  // ── Supervisor → 工具
  { from: 'supervisor', to: 'web_search',  style: 'solid',  label: 'tool call' },
  { from: 'supervisor', to: 'mcp',         style: 'solid',  label: 'tool call' },
];

// 主流程横向居中（py=0.30）
// 状态/记忆层在主流程下方（py=0.62）
// 工具层在最下方（py=0.62），偏右
const LAYOUT = {
  // 主流程
  slack_in:   { px: 0.05, py: 0.30 },
  start:      { px: 0.23, py: 0.30 },
  supervisor: { px: 0.50, py: 0.30 },
  end:        { px: 0.77, py: 0.30 },
  slack_out:  { px: 0.93, py: 0.30 },

  // 状态 / 记忆
  state:      { px: 0.30, py: 0.68 },
  memory:     { px: 0.52, py: 0.68 },

  // 工具
  web_search: { px: 0.70, py: 0.62 },
  mcp:        { px: 0.85, py: 0.62 },
};

// ─── Render ──────────────────────────────────────────────────────

const svg       = document.getElementById('svg');
const edgesG    = document.getElementById('edges-layer');
const nodesG    = document.getElementById('nodes-layer');
let W = 0, H = 0;

function pt(id) {
  const l = LAYOUT[id];
  return [l.px * W, l.py * H];
}

function nodeById(id) { return NODES.find(n => n.id === id); }

function render() {
  W = svg.clientWidth;
  H = svg.clientHeight;
  edgesG.innerHTML = '';
  nodesG.innerHTML = '';

  // ── Edges ──────────────────────────────────────
  for (const e of EDGES) {
    const [ax, ay] = pt(e.from);
    const [bx, by] = pt(e.to);
    const rA = nodeById(e.from).r;
    const rB = nodeById(e.to).r;

    const dx = bx - ax, dy = by - ay;
    const len = Math.hypot(dx, dy);
    const ux = dx / len, uy = dy / len;

    const x1 = ax + ux * (rA + 2);
    const y1 = ay + uy * (rA + 2);
    const x2 = bx - ux * (rB + 8);
    const y2 = by - uy * (rB + 8);

    let d;
    if (e.curve) {
      // Arc below the main line to avoid overlapping with the forward edges
      const cpx = (x1 + x2) / 2;
      const cpy = (y1 + y2) / 2 + 55;
      d = `M${x1},${y1} Q${cpx},${cpy} ${x2},${y2}`;
    } else {
      d = `M${x1},${y1} L${x2},${y2}`;
    }

    const isDashed = e.style === 'dashed';
    const stroke   = isDashed ? '#1e2d45' : '#3d4f6b';
    const marker   = isDashed ? 'arr-dashed' : 'arr-solid';

    const path = svgEl('path');
    path.setAttribute('d', d);
    path.setAttribute('class', 'edge');
    path.setAttribute('stroke', stroke);
    path.setAttribute('stroke-width', '1.5');
    if (isDashed) path.setAttribute('stroke-dasharray', '5,4');
    path.setAttribute('marker-end', `url(#${marker})`);
    edgesG.appendChild(path);

    if (e.label) {
      let mx, my;
      if (e.curve) {
        mx = (x1 + x2) / 2;
        my = (y1 + y2) / 2 + 62;
      } else {
        mx = (x1 + x2) / 2;
        my = (y1 + y2) / 2;
      }

      const lw = e.label.length * 6.2 + 14;
      const rect = svgEl('rect');
      rect.setAttribute('x', mx - lw / 2);
      rect.setAttribute('y', my - 9);
      rect.setAttribute('width', lw);
      rect.setAttribute('height', 16);
      rect.setAttribute('rx', 4);
      rect.setAttribute('class', 'edge-label-bg');
      edgesG.appendChild(rect);

      const txt = svgEl('text');
      txt.setAttribute('x', mx);
      txt.setAttribute('y', my + 1);
      txt.setAttribute('class', 'edge-label-text');
      txt.textContent = e.label;
      edgesG.appendChild(txt);
    }
  }

  // ── Nodes ──────────────────────────────────────
  for (const node of NODES) {
    const [cx, cy] = pt(node.id);
    const r     = node.r;
    const color = COLORS[node.type];
    const ring  = RING_COLORS[node.type];

    const g = svgEl('g');
    g.setAttribute('class', 'node-group');
    g.dataset.id = node.id;
    g.addEventListener('click', () => selectNode(node));

    // Outer glow ring
    const ringEl = svgEl('circle');
    ringEl.setAttribute('cx', cx);
    ringEl.setAttribute('cy', cy);
    ringEl.setAttribute('r', r + 10);
    ringEl.setAttribute('fill', ring);
    ringEl.setAttribute('class', 'node-ring');
    ringEl.setAttribute('opacity', '0');
    ringEl.style.transition = 'opacity 0.2s';
    g.appendChild(ringEl);

    // Main circle
    const circle = svgEl('circle');
    circle.setAttribute('cx', cx);
    circle.setAttribute('cy', cy);
    circle.setAttribute('r', r);
    circle.setAttribute('fill', color);
    circle.setAttribute('class', 'node-main');
    g.appendChild(circle);

    // Inner highlight
    const hi = svgEl('circle');
    hi.setAttribute('cx', cx - r * 0.2);
    hi.setAttribute('cy', cy - r * 0.25);
    hi.setAttribute('r', r * 0.55);
    hi.setAttribute('fill', 'rgba(255,255,255,0.07)');
    hi.setAttribute('pointer-events', 'none');
    g.appendChild(hi);

    // Label
    const label = svgEl('text');
    label.setAttribute('x', cx);
    label.setAttribute('y', node.sublabel ? cy - 7 : cy);
    label.setAttribute('class', 'node-label-main');
    label.textContent = node.label;
    g.appendChild(label);

    if (node.sublabel) {
      const sub = svgEl('text');
      sub.setAttribute('x', cx);
      sub.setAttribute('y', cy + 10);
      sub.setAttribute('class', 'node-label-sub');
      sub.textContent = node.sublabel;
      g.appendChild(sub);
    }

    nodesG.appendChild(g);
  }
}

function svgEl(tag) {
  return document.createElementNS('http://www.w3.org/2000/svg', tag);
}

// ─── Panel ───────────────────────────────────────────────────────

const panel      = document.getElementById('panel');
const panelName  = document.getElementById('panel-name');
const panelType  = document.getElementById('panel-type');
const panelIcon  = document.getElementById('panel-icon');
const panelPre   = document.getElementById('panel-prompt');
const panelEmpty = document.getElementById('panel-empty');

const ICON_BG = {
  supervisor: 'linear-gradient(135deg,#9d8ef9,#5b4ed4)',
  agent:      'linear-gradient(135deg,#4fe8a8,#1aaa70)',
  external:   'linear-gradient(135deg,#f9b55a,#d4781a)',
  tool:       'linear-gradient(135deg,#7dd3fc,#0369a1)',
  state:      'linear-gradient(135deg,#f9a8d4,#be185d)',
  entry:      'linear-gradient(135deg,#5a6f8a,#2d3f55)',
  end:        'linear-gradient(135deg,#5a6f8a,#2d3f55)',
};

let selectedId = null;

function selectNode(node) {
  if (selectedId === node.id) { closePanel(); return; }
  selectedId = node.id;

  document.querySelectorAll('.node-group').forEach(g => {
    const isSelected = g.dataset.id === node.id;
    g.classList.toggle('selected', isSelected);
    const ring = g.querySelector('.node-ring');
    if (ring) ring.setAttribute('opacity', isSelected ? '1' : '0');
  });

  panelName.textContent  = node.label + (node.sublabel ? '' : '');
  panelType.textContent  = TYPE_LABEL[node.type] ?? node.type;
  panelIcon.textContent  = ICON[node.type] ?? '●';
  panelIcon.style.background = ICON_BG[node.type];

  if (node.prompt) {
    panelPre.textContent   = node.prompt;
    panelPre.style.display = 'block';
    panelEmpty.style.display = 'none';
  } else {
    panelPre.style.display   = 'none';
    panelEmpty.style.display = 'block';
  }

  panel.classList.add('open');
}

function closePanel() {
  selectedId = null;
  panel.classList.remove('open');
  document.querySelectorAll('.node-group').forEach(g => {
    g.classList.remove('selected');
    const ring = g.querySelector('.node-ring');
    if (ring) ring.setAttribute('opacity', '0');
  });
}

document.getElementById('panel-close').addEventListener('click', closePanel);

// ─── Init ────────────────────────────────────────────────────────

const ro = new ResizeObserver(() => render());
ro.observe(document.getElementById('canvas'));
render();
</script>
