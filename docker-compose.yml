# ================================================================
# Synod — docker-compose 服务定义
# ================================================================
# 常用命令：
#   docker compose up -d           # 后台启动
#   docker compose down            # 停止并移除容器
#   docker compose logs -f synod   # 跟踪 agent 日志
#   docker compose logs -f ui      # 跟踪 UI 日志
#   docker compose build           # 重新构建镜像
#   docker compose restart synod   # 重启 agent
# ================================================================

services:
  # ── 主 Agent 服务 ──────────────────────────────────────────────
  synod:
    build:
      context: .
      dockerfile: Dockerfile
    image: synod:latest
    container_name: synod

    # Docker 重启策略：崩溃或守护进程重启后自动恢复
    restart: unless-stopped

    # 密钥通过 env_file 注入，永远不写入镜像
    env_file:
      - .env

    environment:
      NODE_ENV: production
      # 如需调试，可在此覆盖（不影响 .env）：
      # LOG_LEVEL: debug

    volumes:
      # 持久化整个 /app/data：日志 (logs/)、通讯录 (contacts.db)、
      # trace 文件等都跨部署保留。用 docker named volume 是因为
      # actions/checkout 会清理 GitHub Actions workspace 里的未追踪
      # 文件 (data/ 被 .gitignore 忽略)，曾经因此在部署时丢日志。
      - synod-data:/app/data

    # Slack Socket Mode 是纯出站 WebSocket，无需暴露端口
    # ports:
    #   - "127.0.0.1:3456:3456"

    # 限制容器资源，防止 LLM 调用失控耗尽宿主机
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 256m

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ── Log Viewer UI 服务 ─────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    image: synod-ui:latest
    container_name: synod-ui

    restart: unless-stopped

    env_file:
      - .env

    environment:
      NODE_ENV: production
      UI_PORT: "3456"

    ports:
      # 局域网可访问：绑定 0.0.0.0 让局域网直接访问
      - "3456:3456"

    volumes:
      # UI 共享同一个 data volume，只读读取日志即可
      - synod-data:/app/data:ro

    depends_on:
      - synod

    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ── Named volumes ─────────────────────────────────────────────────
# synod-data 由 docker 管理（默认存于 /var/lib/docker/volumes/）。
# 包含 logs/、contacts.db、traces.jsonl 等所有跨部署需要保留的数据。
# `docker compose down` 不会删除它；显式删除用
# `docker volume rm synod_synod-data`。
#
# 编辑通讯录（在宿主机上跑）：
#   docker compose exec synod bun run contacts add me slack U0B5YPFSG5C --kind=user
#   docker compose exec synod bun run contacts list
volumes:
  synod-data:
