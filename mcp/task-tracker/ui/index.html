<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Tracker</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --border: #2a2d3a;
  --text: #e1e4ed;
  --text-muted: #8b8fa3;
  --accent: #6c8cff;
  --green: #4ade80;
  --yellow: #facc15;
  --red: #f87171;
  --purple: #c084fc;
  --orange: #fb923c;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ---- Sidebar ---- */
.sidebar {
  width: 300px;
  min-width: 300px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}
.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.sidebar-header h1 { font-size: 18px; font-weight: 600; }
.btn {
  padding: 6px 14px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  font-size: 13px;
  transition: all .15s;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { opacity: 0.85; }
.btn-danger { color: var(--red); }
.btn-danger:hover { border-color: var(--red); background: rgba(248,113,113,.1); }
.btn-sm { padding: 3px 8px; font-size: 12px; }

.filters {
  display: flex;
  gap: 4px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.filter-btn {
  padding: 3px 10px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: 12px;
  cursor: pointer;
}
.filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.task-list {
  flex: 1;
  overflow-y: auto;
}
.task-item {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
}
.task-item:hover { background: rgba(108,140,255,.06); }
.task-item.selected { background: rgba(108,140,255,.12); border-left: 3px solid var(--accent); }
.task-item-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.task-item-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 8px; }

/* ---- Main Panel ---- */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.main-empty {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 15px;
}
.task-detail {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}
.task-header { margin-bottom: 24px; }
.task-header h2 { font-size: 22px; margin-bottom: 4px; }
.task-header .desc { color: var(--text-muted); font-size: 14px; margin-top: 6px; }
.task-header .meta { font-size: 12px; color: var(--text-muted); margin-top: 8px; display: flex; gap: 12px; align-items: center; }

.status-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
}
.status-pending { background: rgba(139,143,163,.15); color: var(--text-muted); }
.status-in_progress { background: rgba(108,140,255,.15); color: var(--accent); }
.status-completed { background: rgba(74,222,128,.15); color: var(--green); }
.status-failed { background: rgba(248,113,113,.15); color: var(--red); }
.status-skipped { background: rgba(192,132,252,.15); color: var(--purple); }

.actions-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

/* ---- Step Tree ---- */
.steps-tree { margin-top: 8px; }
.step-node {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  background: var(--surface);
}
.step-node.linear { border-left: 3px solid var(--accent); }
.step-node.conditional_loop { border-left: 3px solid var(--orange); }
.step-node.fixed_loop { border-left: 3px solid var(--purple); }
.step-node.for_each { border-left: 3px solid var(--green); }

.step-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
}
.step-header .step-type-tag {
  font-size: 10px;
  text-transform: uppercase;
  padding: 1px 6px;
  border-radius: 8px;
  background: rgba(139,143,163,.12);
  color: var(--text-muted);
  letter-spacing: .5px;
}
.step-header .step-title { flex: 1; font-size: 14px; font-weight: 500; }
.step-header .step-status { margin-left: auto; }

.step-body {
  padding: 0 14px 14px;
  font-size: 13px;
  color: var(--text-muted);
}

/* Loop body */
.loop-body {
  margin: 10px 0 10px 20px;
  padding: 10px 14px;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
}
.loop-body-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 8px;
}
.loop-info {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.loop-info span { color: var(--text); font-weight: 500; }

/* Iteration history */
.iteration-history {
  margin-top: 8px;
}
.iteration-history summary {
  font-size: 12px;
  color: var(--accent);
  cursor: pointer;
  margin-bottom: 6px;
}
.iteration-entry {
  padding: 6px 10px;
  margin-bottom: 4px;
  background: rgba(139,143,163,.06);
  border-radius: 4px;
  font-size: 12px;
  color: var(--text-muted);
}

/* Output */
.step-output {
  margin-top: 8px;
  padding: 8px 12px;
  background: rgba(0,0,0,.2);
  border-radius: 4px;
  font-size: 12px;
  font-family: 'SF Mono', 'Menlo', monospace;
  white-space: pre-wrap;
  max-height: 150px;
  overflow-y: auto;
}

/* ---- Modal ---- */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  min-width: 420px;
  max-width: 560px;
  max-height: 80vh;
  overflow-y: auto;
}
.modal h3 { font-size: 16px; margin-bottom: 16px; }
.modal label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 4px; margin-top: 12px; }
.modal input, .modal textarea, .modal select {
  width: 100%;
  padding: 8px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
}
.modal textarea { min-height: 60px; resize: vertical; }
.modal-buttons { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

/* Step type selector in modal */
.step-type-selector { display: flex; gap: 6px; margin-bottom: 12px; }
.step-type-opt {
  padding: 4px 10px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: 12px;
  cursor: pointer;
}
.step-type-opt.selected { border-color: var(--accent); color: var(--accent); background: rgba(108,140,255,.1); }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-header">
    <h1>📋 Task Tracker</h1>
    <button class="btn btn-primary" onclick="showCreateTaskModal()">+ New</button>
  </div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-status="">All</button>
    <button class="filter-btn" data-status="pending">Pending</button>
    <button class="filter-btn" data-status="in_progress">In Progress</button>
    <button class="filter-btn" data-status="completed">Completed</button>
    <button class="filter-btn" data-status="failed">Failed</button>
  </div>
  <div class="task-list" id="taskList"></div>
</div>

<!-- Main -->
<div class="main" id="mainPanel">
  <div class="main-empty">Select a task or create a new one</div>
</div>

<!-- Modals container -->
<div id="modalContainer"></div>

<script>
// ============================================================
// State
// ============================================================
let tasks = [];
let selectedTaskId = null;
let filterStatus = '';

// ============================================================
// API
// ============================================================
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw new Error(err.error || 'Request failed');
  }
  return res.json();
}

// ============================================================
// Render
// ============================================================
function statusBadge(status) {
  return `<span class="status-badge status-${status}">${status.replace('_',' ')}</span>`;
}

function stepTypeTag(type) {
  const labels = { linear: '→ step', conditional_loop: '⟳ while', fixed_loop: '🔁 repeat', for_each: '↗ for each' };
  return `<span class="step-type-tag">${labels[type] || type}</span>`;
}

function renderStep(step, depth = 0) {
  let html = `<div class="step-node ${step.type}">`;
  html += `<div class="step-header">`;
  html += stepTypeTag(step.type);
  html += `<span class="step-title">${esc(step.title)}</span>`;
  html += `<span class="step-status">${statusBadge(step.status)}</span>`;
  html += `<button class="btn btn-sm" onclick="event.stopPropagation(); showEditStepModal('${step.id}')" title="Edit">✏️</button>`;
  html += `</div>`;

  // Description
  if (step.description) {
    html += `<div class="step-body">${esc(step.description)}</div>`;
  }

  // Linear output
  if (step.type === 'linear' && step.output) {
    html += `<div class="step-body"><div class="step-output">${esc(step.output)}</div></div>`;
  }

  // Loop info
  if (step.type === 'conditional_loop') {
    html += `<div class="step-body">`;
    html += `<div class="loop-info">Condition: <span>${esc(step.condition)}</span> &nbsp;|&nbsp; Max: <span>${step.maxIterations}</span> &nbsp;|&nbsp; Iteration: <span>${step.currentIteration}</span></div>`;
    html += renderLoopBody(step.body);
    html += renderIterationHistory(step.iterationResults, 'iteration');
    html += `</div>`;
  }
  if (step.type === 'fixed_loop') {
    html += `<div class="step-body">`;
    html += `<div class="loop-info">Repeat: <span>${step.count}×</span> &nbsp;|&nbsp; Current: <span>${step.currentIteration}</span></div>`;
    html += renderLoopBody(step.body);
    html += renderIterationHistory(step.iterationResults, 'iteration');
    html += `</div>`;
  }
  if (step.type === 'for_each') {
    html += `<div class="step-body">`;
    html += `<div class="loop-info">For each <span>${esc(step.itemName)}</span> in [${step.items.map(esc).join(', ')}] &nbsp;|&nbsp; Index: <span>${step.currentIndex}/${step.items.length}</span></div>`;
    html += renderLoopBody(step.body);
    html += renderForEachHistory(step.iterationResults);
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

function renderLoopBody(body) {
  if (!body || body.length === 0) return '<div class="loop-body"><div class="loop-body-label">Body (empty)</div></div>';
  let html = '<div class="loop-body"><div class="loop-body-label">Loop Body</div>';
  for (const s of body) html += renderStep(s);
  html += '</div>';
  return html;
}

function renderIterationHistory(results, key) {
  if (!results || results.length === 0) return '';
  let html = '<details class="iteration-history"><summary>Iteration History (' + results.length + ')</summary>';
  for (const r of results) {
    html += `<div class="iteration-entry">#${r[key] + 1} — ${r.steps.length} steps (${r.steps.filter(s=>s.status==='completed').length} done, ${r.steps.filter(s=>s.status==='failed').length} failed)</div>`;
  }
  html += '</details>';
  return html;
}

function renderForEachHistory(results) {
  if (!results || results.length === 0) return '';
  let html = '<details class="iteration-history"><summary>Iteration History (' + results.length + ')</summary>';
  for (const r of results) {
    html += `<div class="iteration-entry">[${r.index}] ${esc(r.item)} — ${r.steps.length} steps (${r.steps.filter(s=>s.status==='completed').length} done, ${r.steps.filter(s=>s.status==='failed').length} failed)</div>`;
  }
  html += '</details>';
  return html;
}

function renderTaskDetail(task) {
  let html = '<div class="task-detail">';
  html += `<div class="task-header">`;
  html += `<h2>${esc(task.title)}</h2>`;
  if (task.description) html += `<div class="desc">${esc(task.description)}</div>`;
  html += `<div class="meta">${statusBadge(task.status)} <span>Created: ${fmtDate(task.createdAt)}</span> <span>Updated: ${fmtDate(task.updatedAt)}</span></div>`;
  html += `</div>`;

  html += `<div class="actions-bar">`;
  html += `<button class="btn" onclick="showAddStepModal('${task.id}')">+ Add Step</button>`;
  html += `<select id="taskStatusSelect" onchange="updateTaskStatus('${task.id}', this.value)" style="padding:5px 8px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;">`;
  for (const s of ['pending','in_progress','completed','failed']) {
    html += `<option value="${s}" ${task.status===s?'selected':''}>${s.replace('_',' ')}</option>`;
  }
  html += `</select>`;
  html += `<button class="btn btn-sm" onclick="showEditTaskModal('${task.id}')">Edit</button>`;
  html += `<button class="btn btn-sm btn-danger" onclick="deleteTask('${task.id}')">Delete</button>`;
  html += `</div>`;

  html += '<div class="steps-tree">';
  if (task.steps.length === 0) {
    html += '<p style="color:var(--text-muted);font-size:13px;">No steps yet. Click "+ Add Step" to begin.</p>';
  } else {
    for (const s of task.steps) html += renderStep(s);
  }
  html += '</div></div>';

  document.getElementById('mainPanel').innerHTML = html;
}

function renderTaskList() {
  const list = document.getElementById('taskList');
  const filtered = filterStatus ? tasks.filter(t => t.status === filterStatus) : tasks;
  if (filtered.length === 0) {
    list.innerHTML = '<div style="padding:20px;color:var(--text-muted);font-size:13px;text-align:center;">No tasks</div>';
    return;
  }
  list.innerHTML = filtered.map(t => `
    <div class="task-item ${t.id === selectedTaskId ? 'selected' : ''}" onclick="selectTask('${t.id}')">
      <div class="task-item-title">${esc(t.title)}</div>
      <div class="task-item-meta">
        ${statusBadge(t.status)}
        <span>${t.steps.length} steps</span>
        <span>${fmtDate(t.updatedAt)}</span>
      </div>
    </div>
  `).join('');
}

// ============================================================
// Actions
// ============================================================
async function loadTasks() {
  tasks = await api('GET', '/api/tasks');
  renderTaskList();
  if (selectedTaskId) {
    const t = tasks.find(x => x.id === selectedTaskId);
    if (t) renderTaskDetail(t);
    else { selectedTaskId = null; document.getElementById('mainPanel').innerHTML = '<div class="main-empty">Select a task or create a new one</div>'; }
  }
}

function selectTask(id) {
  selectedTaskId = id;
  const t = tasks.find(x => x.id === id);
  if (t) renderTaskDetail(t);
  renderTaskList();
}

async function updateTaskStatus(taskId, status) {
  await api('PATCH', `/api/tasks/${taskId}`, { status });
  await loadTasks();
}

async function deleteTask(taskId) {
  if (!confirm('Delete this task permanently?')) return;
  await api('DELETE', `/api/tasks/${taskId}`);
  if (selectedTaskId === taskId) {
    selectedTaskId = null;
    document.getElementById('mainPanel').innerHTML = '<div class="main-empty">Select a task or create a new one</div>';
  }
  await loadTasks();
}

// ============================================================
// Modals
// ============================================================
function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }

function showCreateTaskModal() {
  document.getElementById('modalContainer').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Create Task</h3>
        <label>Title</label><input id="mt-title" placeholder="Task title">
        <label>Description</label><textarea id="mt-desc" placeholder="Optional description"></textarea>
        <div class="modal-buttons">
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="createTask()">Create</button>
        </div>
      </div>
    </div>`;
  document.getElementById('mt-title').focus();
}

async function createTask() {
  const title = document.getElementById('mt-title').value.trim();
  const desc = document.getElementById('mt-desc').value.trim();
  if (!title) return alert('Title is required');
  const task = await api('POST', '/api/tasks', { title, description: desc });
  closeModal();
  await loadTasks();
  selectTask(task.id);
}

function showEditTaskModal(taskId) {
  const t = tasks.find(x => x.id === taskId);
  if (!t) return;
  document.getElementById('modalContainer').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Edit Task</h3>
        <label>Title</label><input id="mt-title" value="${escAttr(t.title)}">
        <label>Description</label><textarea id="mt-desc">${escAttr(t.description)}</textarea>
        <div class="modal-buttons">
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="editTask('${taskId}')">Save</button>
        </div>
      </div>
    </div>`;
}

async function editTask(taskId) {
  const title = document.getElementById('mt-title').value.trim();
  const desc = document.getElementById('mt-desc').value.trim();
  if (!title) return alert('Title is required');
  await api('PATCH', `/api/tasks/${taskId}`, { title, description: desc });
  closeModal();
  await loadTasks();
}

let addStepParentId = null;
let addStepTaskId = null;

function showAddStepModal(taskId, parentStepId) {
  addStepTaskId = taskId;
  addStepParentId = parentStepId || null;
  document.getElementById('modalContainer').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Add Step ${parentStepId ? '(inside loop)' : ''}</h3>
        <div class="step-type-selector" id="stepTypeSelector">
          <button class="step-type-opt selected" data-type="linear">→ Linear</button>
          <button class="step-type-opt" data-type="conditional_loop">⟳ While</button>
          <button class="step-type-opt" data-type="fixed_loop">🔁 Repeat N</button>
          <button class="step-type-opt" data-type="for_each">↗ For Each</button>
        </div>
        <label>Title</label><input id="ms-title" placeholder="Step title">
        <label>Description</label><textarea id="ms-desc" placeholder="Optional"></textarea>
        <div id="stepExtraFields"></div>
        <div class="modal-buttons">
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="addStep()">Add</button>
        </div>
      </div>
    </div>`;

  let stepType = 'linear';
  document.querySelectorAll('.step-type-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.step-type-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      stepType = btn.dataset.type;
      renderStepExtraFields(stepType);
    });
  });
  renderStepExtraFields('linear');
  window._stepType = () => stepType;
}

function renderStepExtraFields(type) {
  const el = document.getElementById('stepExtraFields');
  if (type === 'conditional_loop') {
    el.innerHTML = `<label>Condition (description)</label><input id="ms-condition" placeholder="e.g. 'all tests pass' or 'retry count < 3'">
      <label>Max Iterations</label><input id="ms-maxIter" type="number" value="100">`;
  } else if (type === 'fixed_loop') {
    el.innerHTML = `<label>Repeat Count</label><input id="ms-count" type="number" value="3" min="1">`;
  } else if (type === 'for_each') {
    el.innerHTML = `<label>Item Name</label><input id="ms-itemName" placeholder="e.g. 'file', 'user', 'repo'" value="item">
      <label>Items (comma-separated)</label><input id="ms-items" placeholder="item1, item2, item3">`;
  } else {
    el.innerHTML = '';
  }
}

async function addStep() {
  const title = document.getElementById('ms-title').value.trim();
  const desc = document.getElementById('ms-desc').value.trim();
  if (!title) return alert('Title is required');
  const type = window._stepType ? window._stepType() : 'linear';

  const step = { type, title, description: desc };

  if (type === 'conditional_loop') {
    step.condition = document.getElementById('ms-condition')?.value || '';
    step.maxIterations = parseInt(document.getElementById('ms-maxIter')?.value || '100');
    step.body = [];
  }
  if (type === 'fixed_loop') {
    step.count = parseInt(document.getElementById('ms-count')?.value || '3');
    step.body = [];
  }
  if (type === 'for_each') {
    step.itemName = document.getElementById('ms-itemName')?.value || 'item';
    step.items = (document.getElementById('ms-items')?.value || '').split(',').map(s => s.trim()).filter(Boolean);
    step.body = [];
  }

  const body = { task_id: addStepTaskId, step };
  if (addStepParentId) body.parent_step_id = addStepParentId;

  await api('POST', `/api/tasks/${addStepTaskId}/steps`, body);
  closeModal();
  await loadTasks();
}

function showEditStepModal(stepId) {
  const task = tasks.find(t => t.id === selectedTaskId);
  if (!task) return;
  function findStep(steps, id) {
    for (const s of steps) {
      if (s.id === id) return s;
      if (s.body) { const f = findStep(s.body, id); if (f) return f; }
    }
    return null;
  }
  const step = findStep(task.steps, stepId);
  if (!step) return alert('Step not found');

  const statusOpts = ['pending','in_progress','completed','failed','skipped']
    .map(s => `<option value="${s}" ${step.status===s?'selected':''}>${s.replace('_',' ')}</option>`).join('');

  document.getElementById('modalContainer').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Edit Step</h3>
        <label>Title</label><input id="ms-title" value="${escAttr(step.title)}">
        <label>Description</label><textarea id="ms-desc">${escAttr(step.description)}</textarea>
        <label>Status</label><select id="ms-status">${statusOpts}</select>
        ${step.type === 'linear' ? `<label>Output</label><textarea id="ms-output">${escAttr(step.output || '')}</textarea>` : ''}
        <div class="modal-buttons">
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="editStep('${stepId}')">Save</button>
        </div>
      </div>
    </div>`;
}

async function editStep(stepId) {
  const title = document.getElementById('ms-title').value.trim();
  const desc = document.getElementById('ms-desc').value.trim();
  const status = document.getElementById('ms-status').value;
  const body = { step_id: stepId, title, description: desc, status };
  const outputEl = document.getElementById('ms-output');
  if (outputEl) body.output = outputEl.value;

  await api('PATCH', `/api/tasks/${selectedTaskId}/steps`, body);
  closeModal();
  await loadTasks();
}

// ============================================================
// Filters
// ============================================================
document.getElementById('filters').addEventListener('click', (e) => {
  if (!e.target.classList.contains('filter-btn')) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  filterStatus = e.target.dataset.status;
  renderTaskList();
});

// ============================================================
// Utils
// ============================================================
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(s) { if (!s) return ''; const d = new Date(s); return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }

// ============================================================
// Init
// ============================================================
loadTasks();
setInterval(loadTasks, 3000);

// Close modal on Escape
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});
</script>
</body>
</html>
